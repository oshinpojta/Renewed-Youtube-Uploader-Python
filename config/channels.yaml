channels:
  - channel_profile_id: channel_gaming_tech
    channel_name: "Gaming Tech Pulse"
    oauth_client_secrets_file: "client_secrets.json"
    token_store_key: "channel_gaming_tech"
    timezone: "Asia/Kolkata"
    default_privacy_status: "private"
    niches:
      - niche_a_roblox_ugc_explainers
      - niche_b_ai_workflow_micro_tutorials
    schedule_windows:
      - day_of_week: monday
        start_hour: 18
        end_hour: 22
      - day_of_week: wednesday
        start_hour: 18
        end_hour: 22
      - day_of_week: saturday
        start_hour: 10
        end_hour: 14
    fallback_hours: [12, 19, 21]

  - channel_profile_id: channel_culture_trends
